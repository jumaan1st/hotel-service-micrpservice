server:
  port: 8082
spring:
  config:
    import: optional:configserver:${CONFIG_SERVER_URL}
  application:
    name: hotel-service

  datasource:
    url: jdbc:postgresql://localhost:5432/hotelservices
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect